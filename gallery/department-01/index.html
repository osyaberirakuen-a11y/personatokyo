<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Department 01</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

h1{
  text-align:center;
  padding:24px 10px;
  font-weight:normal;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:8px;
  padding:8px;
}

.gallery img{
  width:100%;
  height:auto;
  display:block;
  border-radius:8px;
  cursor:pointer;
}

@media screen and (min-width: 768px){
  .gallery{
    max-width:1200px;
    margin:0 auto;
    grid-template-columns:repeat(5, 1fr);
    gap:12px;
    padding:20px;
  }
}

.lightbox{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.92);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lightbox img{
  max-width:95%;
  max-height:95%;
}

.close{
  position:fixed;
  top:15px;
  right:20px;
  font-size:36px;
  color:white;
}

.back{
  text-align:center;
  padding:30px;
}

.back a{
  color:white;
  text-decoration:none;
  border:1px solid #666;
  padding:10px 20px;
  border-radius:20px;
}
</style>
</head>

<body>

<h1>Department 01</h1>

<div class="gallery">
  <img src="dp01-001.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-002.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-003.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-004.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-005.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-006.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-007.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-008.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-009.jpg" onclick="openLightbox(this.src)">
  <img src="dp01-010.jpg" onclick="openLightbox(this.src)">
</div>

<div class="back">
  <a href="../index.html">← Galleryへ戻る</a>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
function openLightbox(src){
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeLightbox(){
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
