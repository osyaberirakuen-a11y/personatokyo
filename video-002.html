<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Video</title>
  <style>
    body {
      margin: 0;
      padding: 20px 0;
      background-color: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .video-container {
      position: relative;
      width: 100%;
      max-width: 360px;        /* さらに少し小さく調整 */
      padding-top: 177.78%;    /* 縦型（9:16） */
      background: #000;
      margin-bottom: 50px;
      border: 1px solid #222;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    }
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .back-button {
      padding: 14px 32px;
      background-color: #1a1a1a;
      color: #ddd;
      text-decoration: none;
      border: 1px solid #555;
      border-radius: 6px;
      font-size: 1.05rem;
      transition: all 0.3s;
    }
    .back-button:hover {
      background-color: #333;
      color: white;
      border-color: #777;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <iframe
      src="https://customer-pf2mwl2qmvzdosc1.cloudflarestream.com/8acb6ceb1e5ceb8d68b76f81743be0a6/iframe"
      loading="lazy"
      allowfullscreen="true"
      allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;">
    </iframe>
  </div>

  <a href="https://www.personatokyo.com/%E3%83%9B%E3%83%86%E3%83%AB%E3%83%88%E3%83%A8%E3%83%9E%E3%83%AB%E3%83%9A%E3%83%AB%E3%82%BD%E3%83%8A"/ class="back-button">
    ← 戻る
  </a>
</body>
</html>
